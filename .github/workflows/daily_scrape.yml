name: Daily Song Scraper
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg portaudio19-dev

      - name: Install Python dependencies
        run: |
          pip install yt-dlp pydub scipy numpy sqlalchemy sqlalchemy-utils tenacity six huggingface_hub matplotlib pyaudio

      - name: Verify files exist
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== All files in repo ==="
          find . -not -path './.git/*' -type f
          echo "=== Dejavu folder ==="
          ls -la dejavu/ || echo "dejavu/ NOT FOUND"

      - name: Pull DB and progress from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
          SCRAPER_DIR: ${{ github.workspace }}/dejavu
        run: |
          python - <<'EOF'
          from huggingface_hub import hf_hub_download
          import os, shutil
          token = os.environ["HF_TOKEN"]
          space = os.environ["HF_SPACE"]
          scraper_dir = os.environ["SCRAPER_DIR"]
          os.makedirs(scraper_dir, exist_ok=True)
          for filename in ["fingerprints.db", "scraper_progress.json"]:
              try:
                  path = hf_hub_download(
                      repo_id=space,
                      filename=filename,
                      repo_type="space",
                      token=token,
                  )
                  shutil.copy(path, os.path.join(scraper_dir, filename))
                  print(f"✅ Pulled {filename} → {scraper_dir}")
              except Exception as e:
                  print(f"⚠️ {filename} not found, starting fresh: {e}")
          EOF

      - name: Run scraper
        env:
          SCRAPER_DIR: ${{ github.workspace }}/dejavu
        run: |
          cd "$SCRAPER_DIR"
          echo "=== Running from: $(pwd) ==="
          echo "=== Files in scraper dir ==="
          ls -la
          python scraper.py

      - name: Push DB and progress to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
          SCRAPER_DIR: ${{ github.workspace }}/dejavu
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          token = os.environ["HF_TOKEN"]
          space = os.environ["HF_SPACE"]
          scraper_dir = os.environ["SCRAPER_DIR"]
          for filename in ["fingerprints.db", "scraper_progress.json"]:
              filepath = os.path.join(scraper_dir, filename)
              if os.path.exists(filepath):
                  api.upload_file(
                      path_or_fileobj=filepath,
                      path_in_repo=filename,
                      repo_id=space,
                      repo_type="space",
                      token=token
                  )
                  print(f"✅ Pushed {filename}")
              else:
                  print(f"⚠️ {filepath} not found, skipping")
          EOF
