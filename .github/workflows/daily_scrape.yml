name: Daily Song Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install yt-dlp pydub scipy numpy sqlalchemy sqlalchemy-utils tenacity six huggingface_hub

      - name: Verify files exist
        run: |
          echo "=== Workspace ==="
          ls -la
          echo "=== Dejavu folder ==="
          ls -la dejavu/

      - name: Pull DB and progress from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          python - <<'EOF'
          from huggingface_hub import hf_hub_download
          import os, shutil

          token = os.environ["HF_TOKEN"]
          space = os.environ["HF_SPACE"]

          for filename in ["fingerprints.db", "scraper_progress.json"]:
              try:
                  path = hf_hub_download(
                      repo_id=space,
                      filename=filename,
                      repo_type="space",
                      token=token,
                  )
                  shutil.copy(path, f"./{filename}")
                  print(f"✅ Pulled {filename}")
              except Exception as e:
                  print(f"⚠️ {filename} not found, starting fresh: {e}")
          EOF

      - name: Run scraper
        run: |
          echo "=== Finding scraper.py ==="
          find . -name "scraper.py" -type f
          echo "=== Running ==="
          SCRAPER=$(find . -name "scraper.py" -type f | head -1)
          echo "Found at: $SCRAPER"
          cd $(dirname $SCRAPER)
          python scraper.py

      - name: Push DB and progress to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os

          api = HfApi()
          token = os.environ["HF_TOKEN"]
          space = os.environ["HF_SPACE"]

          for filename in ["fingerprints.db", "scraper_progress.json"]:
              if os.path.exists(filename):
                  api.upload_file(
                      path_or_fileobj=filename,
                      path_in_repo=filename,
                      repo_id=space,
                      repo_type="space",
                      token=token
                  )
                  print(f"✅ Pushed {filename}")
              else:
                  print(f"⚠️ {filename} not found, skipping")
          EOF
